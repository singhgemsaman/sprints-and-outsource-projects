<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="src/main.css">
    <link rel="stylesheet" href="src/output.css">
</head>

<body class="bg-gray-100">
    <div>
        <div class="flex justify-center py-4 flex-wrap gap-4">


            <div class="flex flex-col w-4/5 h-full md:w-1/4 gap-4">
                <div class="card p-4">
                    <div class="flex justify-between px-4 py-2">
                        <div class="font-bold">Add Expense</div>
                        <div class="relative">
                            <div id="convert" class="card py-2 px-4 font-bold cursor-pointer">INR
                            </div>
                            <ul id="currency_options"
                                class="h-[10rem] hidden overflow-y-auto absolute top-full scrollbar-thumb-gray-300 ">
                            </ul>
                        </div>
                    </div>
                    <div class="flex flex-col">
                        <form id="input_form" class="flex flex-col p-4">
                            <label for="total_salary" class="font-light">Total Salary:</label>
                            <input type="number" id="total_salary" name="salary" value=""
                                class="border-2 border-gray-300 rounded-md p-2">
                            <label for="name" class="font-light">Expense Name:</label>
                            <input type="text" id="name" name="name" class="border-2 border-gray-300 rounded-md p-2">
                            <label for="expense_amount" class="font-light">Expense Amount:</label>
                            <input type="number" id="expense_amount" name="expense"
                                class="border-2 border-gray-300 rounded-md p-2">
                            <button type="button" id="calculate"
                                class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded cursor-pointer">Submit</button>
                        </form>
                        <button type="button" id="reset"
                            class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded cursor-pointer">Reset</button>

                    </div>
                </div>

                <div id="err_card" class="card flex justify-center items-center">
                    <div id="error" class="hidden text-red-500 border rounded items-center justify-center p-2 w-50">
                    </div>
                </div>
            </div>


            <div class="card w-full p-4 md:w-1/3 h-150 flex flex-col">
                <div class="flex justify-between items-center px-4 py-2">
                    <div class="font-bold">Expense List</div>
                    <button class="card p-2 cursor-pointer" onclick="export_pdf()">Export</button>
                </div>
                <div class="w-full h-full px-3 overflow-auto scrollbar-thumb-gray-300">
                    <ul class="list-none flex flex-col gap-3" id="card-list"></ul>
                </div>
            </div>

            <div class="md:w-1/3 w-4/5">
                <div class="flex flex-col items-center gap-4">
                    <div id="critical_msg" class="card hidden text-red-600 px-3 py-2 text-center">CRITICAL REMINDER: Remaining salary is below 10%</div>
                    <div class="card flex justify-evenly w-full py-2 px-3">
                        <div class="border rounded border-black px-2 py-1">
                            <div>Total Salary</div>
                            <div id="total_salary_card" class="flex justify-center"></div>
                        </div>
                        <div class="border rounded border-[#f6a8b8] px-2 py-1">
                            <div class="text-[#f6a8b8]">Total Expenses</div>
                            <div id="total_expense_card" class="flex justify-center text-[#f6a8b8]"></div>
                        </div>
                        <div class="border rounded border-[#76b4f6] px-2 py-1">
                            <div class="text-[#76b4f6]">Remaining Balance</div>
                            <div id="remaining_balance_card" class="flex justify-center text-[#76b4f6]"></div>
                        </div>

                    </div>

                    <div class="card">
                        <div class="relative">
                            <canvas id="piechart" class="mb-5"></canvas>
                        </div>
                    </div>

                </div>
            </div>

        </div>
    </div>



    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
    <script src="main.js"></script>
</body>

</html>

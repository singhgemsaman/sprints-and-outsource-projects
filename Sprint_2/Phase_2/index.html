<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="src/output.css">
</head>

<body class="bg-gray-100">
    <div class=" flex justify-around container mx-auto p-4 rounded-2xl">
        <!-- <form action=""> -->
        <form>
            <label for="total_salary">Total Salary:</label>
            <input type="number" id="total_salary" name="salary" class="border-2 border-gray-300 rounded-md p-2 mb-4">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" class="border-2 border-gray-300 rounded-md p-2 mb-4">
            <label for="expense_amount">Expense Amount:</label>
            <input type="number" id="expense_amount" name="expense"
                class="border-2 border-gray-300 rounded-md p-2 mb-4">
        </form>
        <div class="flex flex-col items-center relative">
            <button type="button" id="calculate"
                class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded">Submit</button>
            <div id="error"
                class="hidden absolute top-full text-red-500 border rounded items-center justify-center p-2 w-50"></div>
        </div>
    </div>
    <div class="flex justify-center">
        Total Salary - Total Expenses = Remaining Balance.
    </div>
    <div class="flex justify-center">
        <div id="metrics"></div>
    </div>
    <div class="flex justify-center">
        <table id="list" class="border-collapse border border-gray-300">
            <thead>
                <tr>
                    <th class="border border-gray-300 p-2">S.No</th>
                    <th class="border border-gray-300 p-2">Name</th>
                    <th class="border border-gray-300 p-2">Expense</th>
                    <th class="border border-gray-300 p-2">Actions</th>
                </tr>
            </thead>
            <tbody id="list-body">
            </tbody>
        </table>

        <div relative h-full w-full>
            <canvas id="piechart"></canvas>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="main.js"></script>

</body>

</html>

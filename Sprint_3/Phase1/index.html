<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="src/output.css">
</head>
<body class="bg-gray-100">
    <div>
        <input type="text" id="username_input" class="border rounded bg-white ">
        <button onclick="search()" class="border rounded bg-gray-400 px-2 cursor-pointer">
            Search
        </button>

        <div id="loader" class="hidden flex justify-center items-center p-5">
            Loading...
        </div>
        <main id="card_container" class="hidden py-5 px-20 flex justify-center">

            <div id="card" class="flex flex-col border rounded p-2 lg:w-1/3">
                <div class="flex justify-evenly flex-wrap">
                    <img id="avater" src="" alt="Avatar" class="rounded size-25">
                    <ul  id="identity" class=""></ul>
                </div>
                <div>
                    <p id="bio" class="p-5"></p>
                    <a id="visit_site" href="" target="_blank" class="border rounded bg-gray-900 hover:bg-gray-700 p-1 px-2 text-amber-50">Visit Site</a>
                </div>
            </div>

        </main>
        <div id="err_card" class="hidden flex flex-col justify-center items-center p-5 border bg-gray-400">

        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="src/output.css">
</head>
<body class="bg-gray-100">
    <div>
        <div class="flex justify-center p-3 gap-3">
            <input type="text" id="username_input" class="border rounded bg-white text-3xl">
            <button onclick="search()" class="border rounded bg-gray-900 text-amber-50 px-2 cursor-pointer hover:bg-gray-700">
                Search
            </button>
        </div>

        <div id="loader" class="switch:hidden flex justify-center p-5 text-3xl font-bold text-gray-500">Loading...</div>
        
        <main id="card_container" class="hidden py-5 w-full gap-3 flex-col items-center">

            <div id="card" class="flex flex-col border rounded p-2 w-2/3">
                <div class="flex justify-start gap-2 flex-wrap">
                    <img id="avater" src="" alt="Avatar" class="rounded size-25">
                    <ul id="identity" class=""></ul>
                </div>
                <div>
                    <p id="bio" class="p-5"></p>
                    <a id="visit_site" href="" target="_blank" class="border rounded bg-gray-900 hover:bg-gray-700 p-1 px-2 text-amber-50">Visit Profile</a>
                </div>
            </div>

            <ul id="top_repos" class="p-1 w-3/5 divide-y border"></ul>

        </main>

        <div id="err_card" class="hidden flex-col justify-center items-center p-5 border bg-gray-400"></div>

    </div>
    <script src="main.js"></script>
</body>
</html>
